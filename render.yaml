services:
  - type: web
    name: manufacture-erp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node whatsapp_reporter.js
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: DB_HOST
        fromDatabase:
          name: erp-database
          property: host
      - key: DB_USER
        fromDatabase:
          name: erp-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: erp-database
          property: password
      - key: DB_NAME
        fromDatabase:
          name: erp-database
          property: database
      - key: REDIS_URL
        fromService:
          type: redis
          name: erp-redis
          property: connectionString

  - type: redis
    name: erp-redis
    ipAllowList: []
    plan: free

databases:
  - name: erp-database
    databaseName: manufacturing_erp
    user: admin
    plan: free
