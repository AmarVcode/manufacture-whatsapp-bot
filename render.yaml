services:
  - type: web
    name: manufacture-erp
    env: docker
    plan: free
    envVars:
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: DB_HOST
        fromDatabase:
          name: erp-database
          property: host
      - key: DB_USER
        fromDatabase:
          name: erp-database
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: erp-database
          property: password
      - key: DB_NAME
        fromDatabase:
          name: erp-database
          property: database

databases:
  - name: erp-database
    databaseName: manufacturing_erp
    user: admin
    plan: free
